<script id="dc-inject">
/* =======================================================
   DrunkenCats inject.js v6
   1. Glow orbs
   2. Hero CSS cat (persists through Next.js SPA nav)
   3. Header mini CSS cat (replaces SVG)
   4. Fixed bottom-bar (GM + social)
   ======================================================= */
(function () {
  'use strict';

  var HERO_CAT = [
    '<div class="dc-cat-wrap" aria-hidden="true">',
      '<div class="cat-mascot">',
        '<div class="dizzy-stars">✦ ✧ ✦</div>',
        '<div class="cat-body">',
          '<div class="cat-ear left"></div>',
          '<div class="cat-ear right"></div>',
          '<div class="cat-face">',
            '<div class="cat-eyes">',
              '<div class="cat-eye"></div>',
              '<div class="cat-eye drunk"></div>',
            '</div>',
            '<div class="cat-nose"></div>',
            '<div class="cat-mouth"></div>',
            '<div class="cat-blush left"></div>',
            '<div class="cat-blush right"></div>',
          '</div>',
          '<div class="beer-mug">🍺</div>',
        '</div>',
      '</div>',
    '</div>'
  ].join('');

  var HDR_CAT = [
    '<div class="dc-hdr-cat" aria-hidden="true">',
      '<div class="mc-body">',
        '<div class="mc-ear left"></div>',
        '<div class="mc-ear right"></div>',
        '<div class="mc-eyes">',
          '<div class="mc-eye"></div>',
          '<div class="mc-eye drunk"></div>',
        '</div>',
        '<div class="mc-nose"></div>',
        '<div class="mc-mug">🍺</div>',
      '</div>',
    '</div>'
  ].join('');

  var X_SVG   = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.259 5.63 5.905-5.63zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>';
  var DOC_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>';

  /* ── GLOW ORBS ────────────────────────────────── */
  function addGlows() {
    if (document.querySelector('.dc-glow')) return;
    ['dc-glow dc-glow-1','dc-glow dc-glow-2','dc-glow dc-glow-3'].forEach(function(c){
      var d = document.createElement('div');
      d.className = c; d.setAttribute('aria-hidden','true');
      document.body.insertBefore(d, document.body.firstChild);
    });
  }

  /* ── HERO CAT ─────────────────────────────────── */
  function insertHeroCat() {
    var p = window.location.pathname;
    if (p !== '/' && p !== '/index.html' && p !== '') return;
    if (document.querySelector('.dc-cat-wrap')) return;
    var svg = document.querySelector('svg.animate-float');
    if (!svg) return;
    var container = svg.parentElement;
    if (!container) return;
    var tmp = document.createElement('div');
    tmp.innerHTML = HERO_CAT;
    container.insertBefore(tmp.firstChild, container.firstChild);
  }

  /* ── HEADER CAT ───────────────────────────────── */
  function insertHeaderCat() {
    if (document.querySelector('.dc-hdr-cat')) return;
    var wobble = document.querySelector('header svg.animate-wobble');
    if (!wobble) return;
    var logoLink = wobble.closest('a') || wobble.parentElement;
    if (!logoLink) return;
    var tmp = document.createElement('div');
    tmp.innerHTML = HDR_CAT;
    logoLink.insertBefore(tmp.firstChild, logoLink.firstChild);
  }

  /* ── BOTTOM BAR ───────────────────────────────── */
  function buildBar() {
    if (document.querySelector('.dc-bottom-bar')) return;
    var xHref = 'https://x.com/drunkencatsxyz';
    var docsHref = '#';
    var orig = document.querySelector(
      'div.fixed.bottom-6.right-6, div[class*="fixed"][class*="bottom-6"][class*="right-6"]'
    );
    if (orig) {
      orig.querySelectorAll('a').forEach(function(a){
        var h = a.getAttribute('href') || '';
        if (h.indexOf('x.com')!==-1||h.indexOf('twitter')!==-1) xHref=h;
        else if (h&&h!=='#') docsHref=h;
      });
    }
    var bar = document.createElement('div');
    bar.className = 'dc-bottom-bar';
    var gm = document.createElement('button');
    gm.className = 'dc-gm-btn'; gm.setAttribute('aria-label','Check-in / GM');
    gm.innerHTML = '<span>GM</span>';
    gm.addEventListener('click', function(){
      var t = document.querySelector(
        'button.btn-glow.rounded-full.fixed,button[class*="btn-glow"][class*="rounded-full"][class*="fixed"]'
      );
      if (t) t.click();
    });
    var social = document.createElement('div'); social.className = 'dc-social-btns';
    var xBtn = document.createElement('a');
    xBtn.className='dc-s-btn'; xBtn.href=xHref; xBtn.target='_blank';
    xBtn.rel='noopener noreferrer'; xBtn.setAttribute('aria-label','X / Twitter');
    xBtn.innerHTML=X_SVG;
    var dBtn = document.createElement('a');
    dBtn.className='dc-s-btn'; dBtn.href=docsHref;
    dBtn.setAttribute('aria-label','Documentation'); dBtn.innerHTML=DOC_SVG;
    if (docsHref==='#'){
      dBtn.style.opacity='.4'; dBtn.style.cursor='not-allowed';
      dBtn.addEventListener('click',function(e){e.preventDefault();});
    } else { dBtn.target='_blank'; dBtn.rel='noopener noreferrer'; }
    social.appendChild(xBtn); social.appendChild(dBtn);
    bar.appendChild(gm); bar.appendChild(social);
    document.body.appendChild(bar);
  }

  function syncGMLabel() {
    var r = document.querySelector(
      'button.btn-glow.rounded-full.fixed,button[class*="btn-glow"][class*="rounded-full"][class*="fixed"]'
    );
    var s = document.querySelector('.dc-gm-btn span');
    if (r&&s){var t=r.textContent.trim(); if(t&&t!==s.textContent)s.textContent=t;}
  }

  /* ── FULL INIT ────────────────────────────────── */
  function init() {
    addGlows();
    insertHeroCat();
    insertHeaderCat();
    buildBar();
    syncGMLabel();
  }

  /* ── SPA NAVIGATION (Next.js App Router) ───────── */
  /* Next.js uses pushState for client-side nav — no page reload.
     Poll URL every 200ms; on change, remove stale cats and re-inject. */
  var lastUrl = location.href;
  setInterval(function(){
    if (location.href === lastUrl) return;
    lastUrl = location.href;
    /* Remove old hero cat — only belongs on home */
    var old = document.querySelector('.dc-cat-wrap');
    if (old) old.remove();
    /* Header cat may get re-rendered by React, re-inject */
    var oldH = document.querySelector('.dc-hdr-cat');
    if (oldH) oldH.remove();
    setTimeout(init, 100);
    setTimeout(init, 500);
  }, 200);

  /* Browser back/forward */
  window.addEventListener('popstate', function(){
    setTimeout(function(){
      var old=document.querySelector('.dc-cat-wrap'); if(old)old.remove();
      var oldH=document.querySelector('.dc-hdr-cat'); if(oldH)oldH.remove();
      init();
    }, 100);
    setTimeout(init, 500);
  });

  /* ── BOOT ─────────────────────────────────────── */
  if (document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else { init(); }
  setTimeout(init, 150);
  setTimeout(init, 700);
  setTimeout(init, 1800);

  /* MutationObserver — keep bar and header cat alive */
  new MutationObserver(function(){
    buildBar(); syncGMLabel();
    if (!document.querySelector('.dc-hdr-cat')) insertHeaderCat();
    var p=window.location.pathname;
    if ((p==='/'||p===''||p==='/index.html')&&!document.querySelector('.dc-cat-wrap')) insertHeroCat();
  }).observe(document.body,{childList:true,subtree:false});

})();
